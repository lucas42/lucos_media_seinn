name: "CodeQL configuration for lucos_media_seinn"

# Exclude js/stored-xss globally: document.createElement(tag) where tag is
# read from fs.readdirSync on project-owned source files is a false positive
# (createElement is not an HTML sink), but CodeQL's taint tracking fires on
# this pattern regardless and inline suppression comments are not honoured by
# this configuration.
query-filters:
  - exclude:
      id: js/stored-xss
      paths:
        - tests/**
