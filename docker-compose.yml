services:
  seinn:
    build: .
    container_name: seinn
    ports: 
      - $PORT:$PORT
    environment:
      - MEDIA_MANAGER_URL=https://ceol.l42.eu/
      - KEY_LUCOS_MEDIA_MANAGER
      - KEY_LUCOS_PRIVATE
      - ENVIRONMENT
      - PORT
    image: lucas42/lucos_media_seinn
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
